<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Boat Championship - Loading</title>
    <link rel="stylesheet" href="main.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="loading-page">

    <div class="loading-container">
        <div class="game-logo">
            <h1 class="title-main">DRAGON BOAT</h1>
            <h2 class="title-sub">CHAMPIONSHIP</h2>
        </div>

        <div class="progress-wrapper">
            <div class="loading-text">LOADING... <span id="percent">0%</span></div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="bar"></div>
            </div>
            <div class="tips-container">
                <p id="tips-text">TIPS: Menyiapkan dayung...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
